services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - db
    restart: unless-stopped

  frontend:
      build: ./frontend
      ports:
        - "3000:80"  
      depends_on:
        - backend
      restart: unless-stopped

  db:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: